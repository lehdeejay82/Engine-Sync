name: Build Mac Universal App

on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Mac Universal (Intel & M-Series)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tinytag customtkinter Pillow

      - name: Build with PyInstaller
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.13"
        run: |
          pyinstaller --noconsole --onefile \
            --target-architecture universal2 \
            --icon=sync_icon.icns \
            --add-data "logo_engine.png:." \
            engine_sync_app.py
          
          # Correção: O Mac gera um .app, então precisamos usar a extensão exata
          mv dist/engine_sync_app.app dist/EngineSync_Mac_Universal.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EngineSync_Mac_Universal
          path: dist/EngineSync_Mac_Universal.app
