name: Build Mac Modern

on: [push]

jobs:
  build-mac:
    name: Build Mac (ARM64)
    runs-on: macos-14 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tinytag customtkinter Pillow

      - name: Build with PyInstaller
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          # Compila sem o --onefile para gerar o .app nativo corretamente
          pyinstaller --noconsole \
            --target-architecture arm64 \
            --icon=sync_icon.icns \
            --add-data "logo_engine.png:." \
            engine_sync_app.py
          
          # Renomeia a pasta .app gerada
          mv dist/engine_sync_app.app dist/EngineSync_Modern.app
          
          # Entra na pasta dist e ZIPA o arquivo para não corromper no upload
          cd dist
          zip -r EngineSync_Modern.zip EngineSync_Modern.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EngineSync-Mac-Modern
          path: dist/EngineSync_Modern.zip
