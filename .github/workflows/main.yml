name: Build Mac Apps

on: [push]

# Silencia os avisos amarelos de versão do Node.js
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }} 
    strategy:
      matrix:
        include:
          - target: "modern"
            arch: "arm64" 
            deploy_target: "12.0"
            suffix: "Modern"
            os: macos-14
            python_ver: "3.11"
          - target: "legacy"
            arch: "x86_64" 
            deploy_target: "10.13"
            suffix: "Legacy"
            os: macos-13
            python_ver: "3.9"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_ver }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller tinytag customtkinter Pillow

      - name: Build with PyInstaller
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deploy_target }}
        run: |
          pyinstaller --noconsole --onefile \
            --target-architecture ${{ matrix.arch }} \
            --icon=sync_icon.icns \
            --add-data "logo_engine.png:." \
            engine_sync_app.py
          
          # Move o arquivo gerado para identificar a versão
          mv dist/engine_sync_app dist/EngineSync_${{ matrix.suffix }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EngineSync-${{ matrix.suffix }}
          path: dist/EngineSync_${{ matrix.suffix }}
