workflows:
  mac-universal-build:
    name: Build Engine Sync Mac Universal
    instance_type: mac_mini_m1
    
    scripts:
      - name: Instalar dependencias do Python
        script: |
          pip3 install pyinstaller customtkinter Pillow requests tinytag
          
      - name: Compilar App Mac Universal
        script: |
          # ATENÇÃO: Certifique-se de que o seu script se chama exatamente "engine_sync_app.py"
          # Se o seu arquivo tiver outro nome (ex: main.py), mude o nome no final da linha abaixo!
          pyinstaller --noconsole --onefile --target-architecture universal2 --icon=sync_icon.icns engine_sync_app.py
          
      - name: Compactar o App em ZIP
        script: |
          cd dist
          zip -r EngineSync_MacUniversal.zip engine_sync_app.app
          
    artifacts:
      - dist/EngineSync_MacUniversal.zip
