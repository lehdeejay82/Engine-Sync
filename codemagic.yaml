workflows:
  engine-sync-mac:
    name: Build Engine Sync Mac
    # Trocamos para a máquina Intel do Codemagic
    instance_type: mac_pro
    
    scripts:
      - name: Instalar dependencias do Python
        script: |
          pip3 install pyinstaller customtkinter Pillow requests tinytag
          
      - name: Compilar App Mac
        script: |
          # Retiramos o universal2. O PyInstaller fará o app Intel limpo (que roda no M1 via Rosetta)
          pyinstaller --windowed --icon=sync_icon.icns --add-data "logo_engine.png:." engine_sync_app.py
          
      - name: Compactar o App em ZIP
        script: |
          cd dist
          zip -r EngineSync_Mac.zip engine_sync_app.app
          
    artifacts:
      - dist/EngineSync_Mac.zip
