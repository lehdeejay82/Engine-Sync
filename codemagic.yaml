workflows:
  engine-sync-universal:
    name: Build Engine Sync Mac Universal
    instance_type: mac_mini_m1
    
    scripts:
      - name: Instalar Python Oficial (Universal)
        script: |
          # Baixa e instala o Python oficial que contém as duas arquiteturas (Intel + M1)
          curl -o python-installer.pkg https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg
          sudo installer -pkg python-installer.pkg -target /
          
          # Instala o PyInstaller e suas dependências usando este novo Python Universal
          /Library/Frameworks/Python.framework/Versions/3.11/bin/pip3 install pyinstaller customtkinter Pillow requests tinytag
          
      - name: Compilar App Mac Universal
        script: |
          # Usamos --windowed (padrão oficial para Mac) em vez de --onefile
          /Library/Frameworks/Python.framework/Versions/3.11/bin/pyinstaller --windowed --target-architecture universal2 --icon=sync_icon.icns --add-data "logo_engine.png:." engine_sync_app.py
          
      - name: Compactar o App em ZIP
        script: |
          cd dist
          zip -r EngineSync_MacUniversal.zip engine_sync_app.app
          
    artifacts:
      - dist/EngineSync_MacUniversal.zip
